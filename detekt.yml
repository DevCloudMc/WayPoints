build:
  maxIssues: 0
  weights:
    complexity: 2

style:
  MaxLineLength:
    maxLineLength: 140
  MagicNumber:
    active: false
  ReturnCount:
    max: 6
  UnusedParameter:
    active: false
  UnusedPrivateProperty:
    active: true
  LoopWithTooManyJumpStatements:
    active: false

performance:
  SpreadOperator:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  PrintStackTrace:
    active: false

complexity:
  LongMethod:
    threshold: 80
  TooManyFunctions:
    thresholdInClasses: 25
  ComplexCondition:
    threshold: 5
  CyclomaticComplexMethod:
    threshold: 20

naming:
  MemberNameEqualsClassName:
    active: false
  FunctionNaming:
    excludes: ['**/test/**']
