name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach a rebuilt JAR to'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  attach-jar:
    name: Build JAR, attach to release, publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify tag matches project version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          TAG_VERSION="${TAG#v}"
          GRADLE_VERSION=$(grep -E '^version\s*=' build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "release tag:    $TAG"
          echo "tag version:    $TAG_VERSION"
          echo "gradle version: $GRADLE_VERSION"
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION does not match build.gradle.kts version $GRADLE_VERSION"
            exit 1
          fi

      - name: Build shaded JAR
        run: ./gradlew --no-daemon shadowJar

      - name: Resolve JAR path
        id: jar
        run: |
          JAR=$(ls build/libs/WayPoints-*.jar | head -n1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Attach JAR to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: ${{ steps.jar.outputs.path }}
          fail_on_unmatched_files: true

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew --no-daemon publish
