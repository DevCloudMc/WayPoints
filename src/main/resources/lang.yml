prefix: "<gray>[<gold>WayPoints</gold>]</gray>"

# Generic
internal-error: "<red>Internal error, check the server log.</red>"
player-only: "<red>Players only.</red>"
usage-create: "<yellow>Usage: /wp create <name> [icon]</yellow>"
usage-delete: "<yellow>Usage: /wp delete <name></yellow>"
usage-rename: "<yellow>Usage: /wp rename <old> <new></yellow>"
usage-info: "<yellow>Usage: /wp info <name></yellow>"
usage-tp: "<yellow>Usage: /wp tp <name></yellow>"
usage-share: "<yellow>Usage: /wp share <player> <name></yellow>"
usage-unshare: "<yellow>Usage: /wp unshare <player> <name></yellow>"
usage-visibility: "<yellow>Usage: /wp visibility <show|hide> [personal|global|shared|all]</yellow>"
usage-global-create: "<yellow>Usage: /wp global create <name> <icon></yellow>"
